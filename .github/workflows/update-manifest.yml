name: Update Manifest

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: Extract version info
        id: release
        run: |
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "DATE=$(date -u +"%Y-%m-%dT%H:%M:%S%:z")" >> $GITHUB_OUTPUT

      - name: Fetch release assets (optional fallback)
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.release.outputs.TAG }} \
            > release.json || echo "{}" > release.json

      - name: Update manifest
        run: |
          node << 'EOF'
          const fs = require('fs');

          const manifestPath = 'docs/manifest.json';

          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          const release = JSON.parse(fs.readFileSync('release.json', 'utf8'));

          const version = process.env.VERSION;

          const files = {};

          if (release.assets && Array.isArray(release.assets)) {
            for (const asset of release.assets) {
              const name = asset.name;

              // mineplace3d-linux-x86_64
              // mineplace3d-windows-x86_64.exe
              // mineplace3d-windows-aarch64.exe
              const match = name.match(/^mineplace3d-(.+?)(\.(exe|app|zip|tar\.gz))?$/);

              if (!match) continue;

              const platform = match[1].replace(/-/g, "_");
              files[platform] = name;
            }
          }

          manifest.versions = manifest.versions || {};

          manifest.versions[version] = {
            files,
            uploaded_on: release.published_at || new Date().toISOString()
          };

          manifest.latest = manifest.latest || {};

          if (version.includes("alpha")) {
            manifest.latest.alpha = version;
          } else if (version.includes("beta")) {
            manifest.latest.beta = version;
          } else {
            manifest.latest.stable = version;
          }

          fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2));
          EOF
        env:
          VERSION: ${{ steps.release.outputs.VERSION }}

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/manifest.json

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Update manifest for ${{ steps.release.outputs.TAG }}"
          git push origin main
